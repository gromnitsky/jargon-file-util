<!doctype html>
<title>Jargon File Util</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">

<header>
  <form>
    <fieldset disabled>
      <div id="form__row1">
        <select name="dict">
          <option value="">Loading...</option>
        </select>
        <div id="logo" aria-hidden="true">
          <div>Jargon<br>File Util</div>
          <img src="favicon.svg" alt="">
        </div>
      </div>
      <div id="form__row2">
        <input type="reset" value="R" title="Reset">

        <input type="checkbox" name="fts" id="form__fts">
        <label for="form__fts">FTS</label>

        <input type="submit" value="Go">
        <input type="search" spellcheck="false" name="q">

        <input type="checkbox" name="f" id="form__fixed_string" disabled>
        <label for="form__fixed_string" class="disabled">grep -F</label>

        <input type="hidden" name="slice_from">
      </div>
    </fieldset>
  </form>
  <div id="status">Loading metadata...</div>
  <div id="index"></div>
</header>

<main></main>

<nav class="hidden">
  <button id="prev" type="button">Previous</button>
  <button id="next" type="button">Next</button>
</nav>

<dialog id="fts_dialog">
  <p>Loading an FTS index, please wait.</p>
  <p>This popup window will auto-close.</p>
</dialog>

<script src="node_modules/lunr/lunr.min.js"></script>
<script src="main.js" type="module"></script>
