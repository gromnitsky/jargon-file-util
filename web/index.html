<!doctype html>
<title>Jargon File Util</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --gap: 4px;
  }

  @media screen and (min-width: 801px) {
    body {
      font-family: sans-serif;
      width: 800px;
      margin: 8px auto;
    }
  }

  .error {
      background: crimson;
      color: white;
      padding: var(--gap);
  }

  .glossentry {
    margin: 1em 0;
  }

  .glossterm {
    display: inline-block;

    .glossterm__term {
      font-weight: bold;
      margin-right: 1em;
      font-size: 120%;
    }
    .glossterm__pronunciation {
      font-style: italic;
      margin-right: 0.5em;
    }
  }

  .glossdef {
    table {
      border-collapse: collapse;
      border: 1px solid;
    }
    td {
      border: 1px solid;
      padding: 3px;
    }
    pre {
      padding: 4px;
      overflow-x: auto;
      background-color: #fafafa;
    }
  }

  #index {
    margin-bottom: 1em;

    form fieldset {
      padding: 0;
      border: 0;
      display: flex;
      gap: var(--gap);
      align-items: center;
      input[type="search"] {
        width: 100%;
        font-family: monospace;
      }
    }
  }

  #status {
    margin: var(--gap) 0;
  }

  #list {
    border-top: 1px solid;
    border-bottom: 1px solid;
    max-height: 10em;
    overflow-y: auto;

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--gap);

    a {
      display: block;
      text-decoration: none;
      padding: 0 2px;
      font-family: monospace;
    }

    a.rendered {
      background: blue;
      color: white;
    }
  }

  nav {
    margin-top: 1em;
    padding: 1em 0;
    border-top: 1px solid;
  }
}
</style>

<script src="main.js" type="module"></script>

<div>
  <div id="index">
    <form>
      <fieldset>
        <input type="search" spellcheck="false" name="q">

        <input type="checkbox" name="f" id="fixed_string" disabled>
        <label for="fixed_string" style="white-space: nowrap; color: gray;     user-select: none;">Fixed string</label>

        <input type="checkbox" name="fts" id="fts">
        <label for="fts" style="white-space: nowrap">FTS</label>

        <input type="hidden" name="slice_from">
      </fieldset>
    </form>
    <div id="status"></div>
    <div id="list"></div>
  </div>

  <div id="defs">
  </div>

  <nav>
    <button id="prev">Previous</button>
    <button id="next">Next</button>
  </nav>
</div>
