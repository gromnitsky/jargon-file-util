<!doctype html>
<title>Jargon File Util</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">

<form>
  <fieldset disabled>

    <div>
      <select name="dict">
        <option value="">Loading...</option>
      </select>
      <div id="logo" aria-hidden="true">
        <div>Jargon<br>File Util</div>
        <img src="favicon.svg" alt="">
      </div>
    </div>

    <div>
      <input type="reset" value="∅">
      <select name="type">
        <option value="regex">Regex</option>
        <option value="exact">Exact</option>
        <option value="fts">FTS</option>
      </select>
      <input type="submit" value="Go">
      <input type="search" spellcheck="false" name="query">
      <input type="hidden" name="render_from">
    </div>

  </fieldset>
</form>

<div id="status" class="info">Loading metadata...</div>
<div id="index"></div>

<div id="about" class="hidden"></div>
<main></main>

<nav class="hidden">
  <button id="prev" type="button">Previous</button>
  <button id="next" type="button">Next</button>
</nav>

<dialog id="fts_dialog">
  <p>Loading an FTS index, please wait.</p>
  <p>This popup window will auto-close.</p>
</dialog>

<script src="node_modules/lunr/lunr.min.js"></script>
<script src="main.js" type="module"></script>
