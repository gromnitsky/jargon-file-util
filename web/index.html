<!doctype html>
<title>Jargon File Util</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --gap: 4px;
  }

  html { overflow-y: scroll; }

  @media screen and (min-width: 801px) {
    body {
      font-family: sans-serif;
      width: 800px;
      margin: 8px auto;
    }
  }

  .error {
      background: crimson;
      color: white;
      padding: var(--gap);
  }

  .glossentry {
    margin: 1em 0;
  }

  .glossterm {
    display: inline-block;

    .glossterm__term {
      font-weight: bold;
      margin-right: 1em;
      font-size: 120%;
    }
    .glossterm__pronunciation {
      font-style: italic;
      margin-right: 0.5em;
    }
  }

  .glossdef {
    table {
      border-collapse: collapse;
      border: 1px solid;
    }
    td {
      border: 1px solid;
      padding: 3px;
    }
    pre {
      padding: 4px;
      overflow-x: auto;
      background-color: #fafafa;
    }
  }

  header {
    margin-bottom: 1em;

    form fieldset {
      margin: 0;
      padding: 0;
      border: 0;
      display: flex;
      gap: var(--gap);
      align-items: center;
      input[type="search"] {
        width: 100%;
        font-family: monospace;
      }
      label { white-space: nowrap; }
    }
  }

  #status {
    margin: var(--gap) 0;
  }

  #index {
    border-top: 1px solid;
    border-bottom: 1px solid;
    max-height: 10em;
    overflow-y: auto;

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--gap);

    a {
      display: block;
      text-decoration: none;
      padding: 0 2px;
      font-family: monospace;
    }

    a.rendered {
      background: blue;
      color: white;
    }
  }

  nav {
    margin-top: 1em;
    padding: 1em 0;
    border-top: 1px solid;

    button { width: 6em; }
  }

  .hidden { display: none; }
  .disabled { color: gray; }

  img { max-width: 100% };
}
</style>

<script src="main.js" type="module"></script>

<header>
  <form>
    <fieldset disabled>
      <input type="search" spellcheck="false" name="q">
      <input type="reset" value="RST">

      <input type="checkbox" name="f" id="fixed_string" disabled>
      <label for="fixed_string" class="disabled">Fixed string</label>

      <input type="checkbox" name="fts" id="fts">
      <label for="fts">FTS</label>

      <input type="hidden" name="slice_from">
    </fieldset>
  </form>
  <div id="status"></div>
  <div id="index"></div>
</header>

<main></main> <!-- defs -->

<nav>
  <button id="prev">Previous</button>
  <button id="next">Next</button>
</nav>
